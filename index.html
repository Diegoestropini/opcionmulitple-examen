<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>Juego de Adivinanza Multiple Choice</title>
  <style>
    :root {
      --bg: #0b1220;
      --bg-soft: #0f172a;
      --panel: #111c31;
      --panel-soft: #16243e;
      --surface: #0d1629;
      --line: rgba(148, 163, 184, 0.24);
      --line-strong: rgba(148, 163, 184, 0.38);
      --text: #e5ecf6;
      --muted: #a8b6cc;
      --accent: #22c55e;
      --accent-2: #0ea5e9;
      --danger: #ef4444;
      --radius: 14px;
      --shadow: 0 18px 48px rgba(0, 0, 0, 0.28);
      --focus: 0 0 0 3px rgba(14, 165, 233, 0.24);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 30px 16px 56px;
      color: var(--text);
      font-family: "Segoe UI", "Inter", system-ui, -apple-system, sans-serif;
      background:
        radial-gradient(900px 500px at 8% -10%, rgba(14, 165, 233, 0.14), transparent 60%),
        radial-gradient(800px 420px at 95% 0%, rgba(34, 197, 94, 0.12), transparent 58%),
        linear-gradient(180deg, #08101d, var(--bg-soft) 44%, var(--bg));
    }

    .container {
      width: min(1120px, 100%);
      display: grid;
      grid-template-columns: 420px 1fr;
      gap: 20px;
      transition: grid-template-columns 0.28s ease;
    }

    .container.creator-collapsed {
      grid-template-columns: 94px 1fr;
    }

    @media (max-width: 980px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .card {
      background: linear-gradient(180deg, rgba(20, 33, 55, 0.94), rgba(12, 22, 39, 0.96));
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 2px);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .creator-card {
      background: linear-gradient(180deg, rgba(17, 28, 49, 0.9), rgba(10, 20, 36, 0.94));
    }

    .game-card {
      position: relative;
      overflow: hidden;
    }

    .game-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(14, 165, 233, 0.12), transparent 36%, rgba(34, 197, 94, 0.08));
      opacity: 0.65;
    }

    .game-card > * {
      position: relative;
      z-index: 1;
    }

    .creator-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
    }

    .creator-header h1 {
      margin: 0;
    }

    .toggle-panel-btn {
      width: auto;
      min-width: 110px;
      min-height: 36px;
      padding: 6px 10px;
      font-size: 0.78rem;
      letter-spacing: 0.28px;
      text-transform: uppercase;
    }

    .creator-body {
      display: block;
    }

    .creator-card.is-collapsed {
      padding: 16px 10px;
      cursor: pointer;
    }

    .creator-card.is-collapsed .creator-header {
      margin: 0;
      flex-direction: column;
      align-items: stretch;
      gap: 10px;
    }

    .creator-card.is-collapsed .creator-header h1 {
      font-size: 0;
      line-height: 0;
      margin: 0;
    }

    .creator-card.is-collapsed .toggle-panel-btn {
      width: 100%;
      min-width: 0;
      min-height: 168px;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      text-align: center;
      border-radius: 10px;
    }

    .creator-card.is-collapsed .creator-body {
      display: none;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(1.4rem, 1.2rem + 0.65vw, 1.78rem);
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.04rem;
      font-weight: 600;
      color: #c7d2e4;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 0.84rem;
      letter-spacing: 0.1px;
      color: var(--muted);
    }

    input,
    select,
    button,
    textarea {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(11, 18, 32, 0.78);
      color: var(--text);
      font-size: 0.94rem;
      transition: border-color 0.16s ease, box-shadow 0.16s ease, background-color 0.16s ease, transform 0.08s ease;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(168, 182, 204, 0.76);
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: rgba(14, 165, 233, 0.65);
      box-shadow: var(--focus);
    }

    .field {
      margin-bottom: 14px;
    }

    button {
      cursor: pointer;
      border-color: rgba(34, 197, 94, 0.4);
      background: linear-gradient(135deg, rgba(34, 197, 94, 0.96), rgba(6, 182, 212, 0.92));
      color: #07101d;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(14, 165, 233, 0.2);
    }

    button:active {
      transform: translateY(0);
    }

    button:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    #startBtn {
      width: auto;
      min-width: 132px;
      padding-inline: 14px;
      border: 1px solid rgba(251, 191, 36, 0.34);
      background: linear-gradient(135deg, #fde047, #fb923c);
      color: #111827;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      box-shadow: 0 10px 24px rgba(251, 146, 60, 0.24);
    }

    #startBtn:hover {
      box-shadow: 0 12px 28px rgba(251, 191, 36, 0.3);
    }

    .ghost-btn {
      border-color: var(--line-strong);
      background: rgba(148, 163, 184, 0.1);
      color: var(--text);
      box-shadow: none;
    }

    .ghost-btn:hover {
      background: rgba(148, 163, 184, 0.16);
      box-shadow: 0 8px 18px rgba(2, 6, 23, 0.22);
    }

    .danger-btn {
      border-color: rgba(248, 113, 113, 0.42);
      background: linear-gradient(135deg, #ef4444, #f97316);
      color: #fff;
    }

    .danger-btn:hover {
      box-shadow: 0 10px 24px rgba(239, 68, 68, 0.3);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }

    .chip {
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(148, 163, 184, 0.1);
      padding: 6px 11px;
      font-size: 0.8rem;
      color: #d2ddec;
    }

    .empty-state {
      border: 1px dashed rgba(148, 163, 184, 0.32);
      border-radius: 12px;
      background: rgba(148, 163, 184, 0.07);
      color: var(--muted);
      padding: 14px;
      text-align: center;
    }

    .questions-list {
      max-height: 380px;
      overflow: auto;
      padding-right: 4px;
      display: grid;
      gap: 10px;
    }

    .item {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 13px;
      background: rgba(13, 22, 41, 0.62);
      transition: border-color 0.16s ease, background-color 0.16s ease;
    }

    .item:hover {
      border-color: rgba(148, 163, 184, 0.4);
      background: rgba(16, 28, 50, 0.78);
    }

    .item strong {
      display: block;
      margin-bottom: 9px;
      font-size: 0.95rem;
      line-height: 1.36;
    }

    .options {
      display: grid;
      gap: 7px;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .options span {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      border-radius: 8px;
      padding: 4px 7px;
      background: rgba(148, 163, 184, 0.06);
    }

    .badge {
      margin-left: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(16, 185, 129, 0.38);
      background: rgba(16, 185, 129, 0.16);
      color: #86efac;
      font-size: 0.73rem;
      font-weight: 600;
    }

    .game-area {
      display: grid;
      gap: 16px;
    }

    .game-topbar {
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto;
      align-items: start;
      gap: 12px;
      padding-bottom: 2px;
    }

    .question-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      background: linear-gradient(180deg, rgba(9, 18, 34, 0.84), rgba(10, 18, 32, 0.9));
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .question-box .question-text {
      margin-bottom: 14px;
      font-size: clamp(1.04rem, 0.98rem + 0.25vw, 1.18rem);
      line-height: 1.5;
      color: #edf6ff;
      border: 1px solid rgba(125, 211, 252, 0.26);
      border-radius: 12px;
      padding: 14px 15px;
      background: rgba(14, 165, 233, 0.08);
      text-shadow: none;
      transition: color 0.2s ease;
    }

    .question-box .option-btn {
      width: 100%;
      text-align: left;
      margin-bottom: 10px;
      border: 1px solid rgba(148, 163, 184, 0.28);
      background: rgba(15, 23, 42, 0.82);
      color: #e6eef9;
      text-shadow: none;
      font-weight: 600;
      line-height: 1.36;
    }

    .question-box .option-btn:hover {
      border-color: rgba(14, 165, 233, 0.62);
      background: rgba(14, 165, 233, 0.14);
      color: #f8fbff;
      box-shadow: 0 10px 22px rgba(14, 165, 233, 0.14);
    }

    .question-box.is-active {
      border-color: rgba(14, 165, 233, 0.55);
      box-shadow: 0 14px 34px rgba(14, 165, 233, 0.16);
    }

    .question-box.is-active .question-text {
      color: #f8fbff;
      border-color: rgba(14, 165, 233, 0.52);
      box-shadow: inset 3px 0 0 rgba(14, 165, 233, 0.8);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #c1cfe3;
      font-size: 0.92rem;
    }

    .status .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.14);
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(148, 163, 184, 0.12);
      padding: 6px 11px;
      font-size: 0.81rem;
      font-weight: 600;
      color: #d9e3f2;
    }

    .metric::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 0 3px rgba(148, 163, 184, 0.16);
    }

    .pill.success {
      border-color: rgba(16, 185, 129, 0.4);
      background: rgba(16, 185, 129, 0.16);
      color: #bbf7d0;
    }

    .pill.danger {
      border-color: rgba(239, 68, 68, 0.45);
      background: rgba(239, 68, 68, 0.16);
      color: #fecdd3;
    }

    .pill.info {
      border-color: rgba(14, 165, 233, 0.42);
      background: rgba(14, 165, 233, 0.16);
      color: #bae6fd;
    }

    .pill.eff-high {
      border-color: rgba(16, 185, 129, 0.45);
      background: rgba(16, 185, 129, 0.18);
      color: #bbf7d0;
    }

    .pill.eff-mid {
      border-color: rgba(250, 204, 21, 0.52);
      background: rgba(250, 204, 21, 0.2);
      color: #fef08a;
    }

    .pill.eff-low {
      border-color: rgba(249, 115, 22, 0.52);
      background: rgba(249, 115, 22, 0.2);
      color: #fed7aa;
    }

    .pill.eff-bad {
      border-color: rgba(239, 68, 68, 0.52);
      background: rgba(239, 68, 68, 0.2);
      color: #fecdd3;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .row-fill > * {
      flex: 1;
    }

    .stats {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }

    .materia-row {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 10px;
    }

    .item-actions {
      margin-top: 9px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .mini-btn {
      width: auto;
      min-height: 34px;
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .mini-btn.danger-btn {
      background: linear-gradient(135deg, #ef4444, #f97316);
      color: #fff;
    }

    .option-btn:disabled {
      opacity: 1;
      filter: none;
    }

    .option-btn.correct,
    .option-btn.correct:disabled {
      border: 1px solid rgba(16, 185, 129, 0.64);
      background: rgba(16, 185, 129, 0.16);
      color: #bbf7d0;
      box-shadow: 0 8px 18px rgba(16, 185, 129, 0.16);
    }

    .option-btn.incorrect,
    .option-btn.incorrect:disabled {
      border: 1px solid rgba(239, 68, 68, 0.56);
      background: rgba(239, 68, 68, 0.2);
      color: #fecdd3;
      box-shadow: 0 8px 18px rgba(239, 68, 68, 0.16);
    }

    .errores-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: rgba(13, 22, 41, 0.58);
      display: grid;
      gap: 9px;
    }

    .errores-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    .errores-title {
      margin: 0;
      font-size: 0.98rem;
      color: #d6e0ef;
      font-weight: 600;
    }

    .errores-list {
      display: grid;
      gap: 8px;
    }

    .error-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(248, 113, 113, 0.3);
      background: rgba(248, 113, 113, 0.07);
    }

    .error-text {
      margin: 0;
      color: #fecdd3;
      font-size: 0.88rem;
    }

    .error-count {
      border: 1px solid rgba(248, 113, 113, 0.4);
      border-radius: 999px;
      background: rgba(239, 68, 68, 0.2);
      color: #fecdd3;
      padding: 4px 10px;
      font-weight: 700;
      font-size: 0.8rem;
    }

    .error-item.is-clickable {
      cursor: pointer;
      transition: transform 0.08s ease, border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .error-item.is-clickable:hover {
      transform: translateY(-1px);
      border-color: rgba(248, 113, 113, 0.44);
      box-shadow: 0 10px 20px rgba(239, 68, 68, 0.16);
    }

    .modal {
      position: fixed;
      inset: 0;
      z-index: 50;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(8, 14, 24, 0.74);
      backdrop-filter: blur(5px);
    }

    .modal.is-open {
      display: flex;
    }

    .modal-content {
      width: min(520px, 100%);
      border: 1px solid var(--line-strong);
      border-radius: 16px;
      background: linear-gradient(180deg, #15243f, #0f1a2f);
      box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      padding: 18px;
    }

    .modal-header {
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .modal-question {
      margin: 0 0 12px;
      font-size: 1.02rem;
      line-height: 1.42;
    }

    .modal-options {
      display: grid;
      gap: 8px;
    }

    .modal-option {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: rgba(148, 163, 184, 0.1);
      font-size: 0.9rem;
      color: #dde6f5;
    }

    .modal-option.correcta {
      border-color: rgba(16, 185, 129, 0.45);
      background: rgba(16, 185, 129, 0.16);
      color: #bbf7d0;
    }

    .correct-answer-label {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 7px;
      margin-bottom: 0;
      font-size: 0.84rem;
    }

    .correct-answer-label input[type="radio"] {
      width: 16px;
      min-height: 16px;
      padding: 0;
      accent-color: var(--accent);
    }

    .questions-list,
    .errores-list {
      scrollbar-width: thin;
      scrollbar-color: rgba(148, 163, 184, 0.5) transparent;
    }

    .questions-list::-webkit-scrollbar,
    .errores-list::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .questions-list::-webkit-scrollbar-thumb,
    .errores-list::-webkit-scrollbar-thumb {
      border: 2px solid transparent;
      border-radius: 999px;
      background-clip: padding-box;
      background-color: rgba(148, 163, 184, 0.45);
    }

    .questions-list::-webkit-scrollbar-track,
    .errores-list::-webkit-scrollbar-track {
      background: transparent;
    }

    @media (max-width: 760px) {
      body {
        padding-top: 18px;
      }

      .card {
        padding: 16px;
      }

      .two-col,
      .materia-row {
        grid-template-columns: 1fr;
      }

      .container.creator-collapsed {
        grid-template-columns: 1fr;
      }

      .creator-card.is-collapsed .toggle-panel-btn {
        min-height: 36px;
        writing-mode: horizontal-tb;
        transform: none;
      }

      .game-topbar {
        grid-template-columns: 1fr;
      }

      .row[style*="space-between"] {
        align-items: flex-start;
        flex-direction: column;
      }

      .stats {
        justify-content: flex-start;
      }

      #startBtn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container" id="mainContainer">
    <section class="card creator-card" id="creatorCard">
      <div class="creator-header">
        <h1>Crear preguntas</h1>
        <button id="toggleCreatorBtn" type="button" class="ghost-btn toggle-panel-btn">Plegar panel</button>
      </div>
      <div class="creator-body" id="creatorBody">
      <div class="field">
        <label for="materiaSelect">Materia</label>
        <div class="materia-row">
          <select id="materiaSelect"></select>
          <button id="addMateriaBtn" type="button" class="ghost-btn">Agregar otra materia</button>
        </div>
      </div>
      <div class="field" id="nuevaMateriaField" style="display:none;">
        <label for="materiaNombre">Nueva materia</label>
        <div class="row row-fill">
          <input id="materiaNombre" type="text" placeholder="Ej: Historia" />
          <button id="guardarMateriaBtn" type="button">Guardar materia</button>
        </div>
      </div>
      <div class="two-col">
        <div class="field">
          <label for="pregunta">Pregunta</label>
          <input id="pregunta" type="text" placeholder="Escribe la pregunta" />
        </div>
        <div class="field">
          <label for="opcionesCount">Cantidad de opciones</label>
          <input id="opcionesCount" type="number" min="2" max="6" value="4" />
        </div>
      </div>
      <div id="opcionesContainer" class="field"></div>
      <div class="two-col">
        <button id="addQuestionBtn">Agregar pregunta</button>
        <button id="clearBtn" class="danger-btn" type="button">Eliminar materia</button>
      </div>
      <p id="formMessage" class="chip" style="display:none;"></p>
      <h2>Preguntas guardadas</h2>
      <div class="chips" id="materiaInfo"></div>
      <div class="questions-list" id="listaPreguntas"></div>
      </div>
    </section>

    <section class="card game-card">
      <h1>Jugar</h1>
      <div class="game-area">
        <div class="game-topbar">
          <div class="status"><span class="dot"></span><span id="estadoJuego">Esperando…</span></div>
          <div class="row stats">
            <div class="pill success metric" id="correctas">0</div>
            <div class="pill danger metric" id="incorrectas">0</div>
            <div class="pill info metric" id="efectividad">Efectividad: 0%</div>
            <div class="pill" id="contador">0/0</div>
            <button id="startBtn" class="ghost-btn" type="button">Empezar juego</button>
          </div>
        </div>
        <div class="question-box" id="questionBox">
          <div class="question-text" id="textoPregunta">Agrega preguntas y presiona "Empezar juego"</div>
          <div id="opcionesJuego"></div>
        </div>
        <div class="errores-panel" id="erroresContainer">
          <div class="errores-header">
            <h3 class="errores-title">Preguntas respondidas incorrectamente</h3>
            <div class="pill danger metric errores-count" id="erroresContador">0 errores</div>
          </div>
          <div id="erroresLista" class="errores-list">
            <p class="empty-state">Aún no hay respuestas incorrectas.</p>
          </div>
        </div>
        <div id="detalleModal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitulo" aria-describedby="modalPregunta">
          <div class="modal-content">
            <div class="modal-header">
              <h3 id="modalTitulo" class="errores-title" style="margin:0;">Pregunta respondida incorrectamente</h3>
              <button id="cerrarModalBtn" type="button" class="ghost-btn mini-btn">Cerrar</button>
            </div>
            <p id="modalPregunta" class="modal-question"></p>
            <div id="modalOpciones" class="modal-options"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const materiaSelect = document.getElementById('materiaSelect');
    const addMateriaBtn = document.getElementById('addMateriaBtn');
    const nuevaMateriaField = document.getElementById('nuevaMateriaField');
    const materiaNombreInput = document.getElementById('materiaNombre');
    const guardarMateriaBtn = document.getElementById('guardarMateriaBtn');
    const preguntaInput = document.getElementById('pregunta');
    const opcionesCountInput = document.getElementById('opcionesCount');
    const opcionesContainer = document.getElementById('opcionesContainer');
    const addQuestionBtn = document.getElementById('addQuestionBtn');
    const startBtn = document.getElementById('startBtn');
    const listaPreguntas = document.getElementById('listaPreguntas');
    const materiaInfo = document.getElementById('materiaInfo');
    const formMessage = document.getElementById('formMessage');
    const clearBtn = document.getElementById('clearBtn');
    const questionBox = document.getElementById('questionBox');
    const mainContainer = document.getElementById('mainContainer');
    const creatorCard = document.getElementById('creatorCard');
    const creatorBody = document.getElementById('creatorBody');
    const toggleCreatorBtn = document.getElementById('toggleCreatorBtn');

    const textoPregunta = document.getElementById('textoPregunta');
    const opcionesJuego = document.getElementById('opcionesJuego');
    const estadoJuego = document.getElementById('estadoJuego');
    const contador = document.getElementById('contador');
    const correctasEl = document.getElementById('correctas');
    const incorrectasEl = document.getElementById('incorrectas');
    const efectividadEl = document.getElementById('efectividad');
    const erroresContador = document.getElementById('erroresContador');
    const erroresContainer = document.getElementById('erroresContainer');
    const erroresLista = document.getElementById('erroresLista');
    const detalleModal = document.getElementById('detalleModal');
    const modalPregunta = document.getElementById('modalPregunta');
    const modalOpciones = document.getElementById('modalOpciones');
    const cerrarModalBtn = document.getElementById('cerrarModalBtn');

    let materias = [];
    let materiaActualId = '';
    let preguntas = [];
    let indiceActual = 0;
    let ordenPreguntas = [];
    let pendientes = [];
    let totalPreguntas = 0;
    let completadas = new Set();
    let preguntaEditando = null;
    let correctas = 0;
    let incorrectas = 0;
    let erroresPregunta = {};
    let ordenErrorCronologico = 0;

    const STORAGE_KEY = 'quiz-multi-choice';

    function setCreatorCollapsed(collapsed) {
      const isCollapsed = Boolean(collapsed);
      mainContainer?.classList.toggle('creator-collapsed', isCollapsed);
      creatorCard?.classList.toggle('is-collapsed', isCollapsed);
      if (toggleCreatorBtn) {
        toggleCreatorBtn.textContent = isCollapsed ? 'Abrir panel' : 'Plegar panel';
        toggleCreatorBtn.setAttribute('aria-expanded', String(!isCollapsed));
      }
      if (!isCollapsed && creatorBody) {
        creatorBody.style.display = '';
      }
    }

    function toggleCreatorPanel() {
      setCreatorCollapsed(!creatorCard?.classList.contains('is-collapsed'));
    }

    function guardar() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({ materias, materiaActualId }));
      renderLista();
    }

    function setPreguntaActiva(activa) {
      questionBox?.classList.toggle('is-active', Boolean(activa));
    }

    function escapeHtml(valor) {
      return String(valor)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function cargar() {
      const data = localStorage.getItem(STORAGE_KEY);
      if (data) {
        const parsed = JSON.parse(data);
        if (Array.isArray(parsed.materias)) {
          materias = parsed.materias;
          materiaActualId = parsed.materiaActualId || parsed.materiaActual || '';
        } else {
          const legacyMateria = parsed.materia || '';
          materias = [{ id: `mat-${Date.now()}`, nombre: legacyMateria, preguntas: parsed.preguntas || [] }];
          materiaActualId = materias[0].id;
        }
      }
      renderMateriaSelect();
      seleccionarMateria(materiaActualId || materias[0]?.id || '');
      renderLista();
      renderMateriaInfo();
    }

    function renderMateriaSelect() {
      materiaSelect.innerHTML = '';
      const placeholder = document.createElement('option');
      placeholder.value = '';
      placeholder.textContent = materias.length ? 'Selecciona una materia' : 'Crea una materia para empezar';
      materiaSelect.appendChild(placeholder);
      materias.forEach((m) => {
        const opt = document.createElement('option');
        opt.value = m.id;
        opt.textContent = `${m.nombre || 'Sin nombre'} (${m.preguntas.length})`;
        materiaSelect.appendChild(opt);
      });
      if (materiaActualId) {
        materiaSelect.value = materiaActualId;
      }
    }

    function renderMateriaInfo() {
      materiaInfo.innerHTML = '';
      const materia = obtenerMateriaActual();
      if (!materia || !materia.nombre) return;
      const chip = document.createElement('div');
      chip.className = 'chip';
      chip.textContent = `Materia: ${materia.nombre} (${materia.preguntas.length} preguntas)`;
      materiaInfo.appendChild(chip);
    }

    function renderLista() {
      renderMateriaInfo();
      listaPreguntas.innerHTML = '';
      if (!preguntas.length) {
        listaPreguntas.innerHTML = '<p class="empty-state">No hay preguntas guardadas.</p>';
        return;
      }
      preguntas.forEach((p, idx) => {
        const card = document.createElement('div');
        card.className = 'item';
        const titulo = document.createElement('strong');
        titulo.textContent = `${idx + 1}. ${p.texto}`;
        const opciones = document.createElement('div');
        opciones.className = 'options';
        p.opciones.forEach((o, i) => {
          const opcion = document.createElement('span');
          opcion.textContent = `${i + 1}. ${o} `;
          if (i === p.correcta) {
            const badge = document.createElement('span');
            badge.className = 'badge';
            badge.textContent = 'Correcta';
            opcion.appendChild(badge);
          }
          opciones.appendChild(opcion);
        });
        card.appendChild(titulo);
        card.appendChild(opciones);
        const acciones = document.createElement('div');
        acciones.className = 'item-actions';
        const editBtn = document.createElement('button');
        editBtn.className = 'mini-btn ghost-btn';
        editBtn.textContent = 'Editar';
        editBtn.onclick = () => editarPregunta(idx);
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'mini-btn danger-btn';
        deleteBtn.textContent = 'Borrar';
        deleteBtn.onclick = () => eliminarPregunta(idx);
        acciones.appendChild(editBtn);
        acciones.appendChild(deleteBtn);
        card.appendChild(acciones);
        listaPreguntas.appendChild(card);
      });
    }

    function mostrarMensaje(texto, tipo = 'ok') {
      formMessage.style.display = 'block';
      formMessage.textContent = texto;
      formMessage.style.color = tipo === 'ok' ? '#34d399' : '#f87171';
      setTimeout(() => { formMessage.style.display = 'none'; }, 2200);
    }

    function obtenerMateriaActual() {
      return materias.find((m) => m.id === materiaActualId);
    }

    function seleccionarMateria(id) {
      materiaActualId = id;
      const materia = obtenerMateriaActual();
      preguntas = materia ? materia.preguntas : [];
      totalPreguntas = preguntas.length;
      completadas = new Set();
      pendientes = [];
      ordenPreguntas = [];
      indiceActual = 0;
      preguntaEditando = null;
      addQuestionBtn.textContent = 'Agregar pregunta';
      preguntaInput.value = '';
      construirCamposOpciones();
      contador.textContent = `${completadas.size}/${totalPreguntas || 0}`;
      actualizarStats();
      estadoJuego.textContent = 'Esperando…';
      textoPregunta.textContent = materia ? 'Agrega preguntas y presiona "Empezar juego"' : 'Crea o selecciona una materia para empezar.';
      opcionesJuego.innerHTML = '';
      setPreguntaActiva(false);
      renderMateriaSelect();
      renderLista();
      renderMateriaInfo();
      guardar();
      reiniciarErrores();
    }

    function toggleNuevaMateria() {
      const visible = nuevaMateriaField.style.display !== 'none';
      nuevaMateriaField.style.display = visible ? 'none' : 'block';
      if (!visible) {
        materiaNombreInput.focus();
      }
    }

    function crearNuevaMateria() {
      const nombre = materiaNombreInput.value.trim();
      if (!nombre) return mostrarMensaje('Ingresa el nombre de la materia', 'error');
      if (materias.some((m) => m.nombre.toLowerCase() === nombre.toLowerCase())) {
        return mostrarMensaje('Esa materia ya existe', 'error');
      }
      const id = `mat-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
      const nueva = { id, nombre, preguntas: [] };
      materias.push(nueva);
      materiaNombreInput.value = '';
      nuevaMateriaField.style.display = 'none';
      materiaActualId = id;
      preguntas = nueva.preguntas;
      totalPreguntas = 0;
      completadas = new Set();
      pendientes = [];
      ordenPreguntas = [];
      indiceActual = 0;
      preguntaEditando = null;
      correctas = 0;
      incorrectas = 0;
      addQuestionBtn.textContent = 'Agregar pregunta';
      preguntaInput.value = '';
      construirCamposOpciones();
      renderMateriaSelect();
      materiaSelect.value = id;
      renderLista();
      renderMateriaInfo();
      textoPregunta.textContent = 'Agrega preguntas y presiona "Empezar juego"';
      estadoJuego.textContent = 'Esperando…';
      contador.textContent = '0/0';
      actualizarStats();
      reiniciarErrores();
      guardar();
      mostrarMensaje('Materia agregada');
    }

    function construirCamposOpciones(valores = [], correctaMarcada = 0) {
      const count = valores.length || Math.min(Math.max(parseInt(opcionesCountInput.value, 10) || 0, 2), 6);
      opcionesContainer.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const wrap = document.createElement('div');
        wrap.className = 'field';
        const valor = escapeHtml(valores[i] || '');
        const checked = i === correctaMarcada ? 'checked' : '';
        wrap.innerHTML = `
          <label>Opción ${i + 1} ${i === 0 ? '(correcta por defecto)' : ''}</label>
          <div class="two-col">
            <input type="text" data-opcion="${i}" placeholder="Texto de la opción" value="${valor}" />
            <label class="correct-answer-label">
              <input type="radio" name="correcta" value="${i}" ${checked || (i === 0 && !valores.length ? 'checked' : '')} />
              Correcta
            </label>
          </div>`;
        opcionesContainer.appendChild(wrap);
      }
    }

    function obtenerOpciones() {
      const inputs = opcionesContainer.querySelectorAll('input[type="text"]');
      const opciones = [];
      inputs.forEach((inp) => opciones.push(inp.value.trim()));
      const correcta = parseInt(opcionesContainer.querySelector('input[type="radio"]:checked')?.value || '0', 10);
      return { opciones, correcta };
    }

    function validarPregunta() {
      const materia = obtenerMateriaActual();
      const texto = preguntaInput.value.trim();
      const { opciones, correcta } = obtenerOpciones();

      if (!materia || !materia.nombre) return mostrarMensaje('Selecciona o crea una materia', 'error');
      if (!texto) return mostrarMensaje('Ingresa la pregunta', 'error');
      if (opciones.some(o => !o)) return mostrarMensaje('Completa todas las opciones', 'error');

      if (preguntaEditando !== null) {
        preguntas[preguntaEditando] = { texto, opciones, correcta };
        preguntaEditando = null;
        addQuestionBtn.textContent = 'Agregar pregunta';
        mostrarMensaje('Pregunta actualizada');
      } else {
        preguntas.push({ texto, opciones, correcta });
        mostrarMensaje('Pregunta agregada');
      }
      guardar();
      renderMateriaInfo();
      renderLista();
      preguntaInput.value = '';
      opcionesContainer.querySelectorAll('input[type="text"]').forEach(inp => inp.value = '');
    }

    function barajar(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function iniciarJuego() {
      if (!materiaActualId) {
        estadoJuego.textContent = 'Selecciona una materia';
        return;
      }
      if (!preguntas.length) {
        estadoJuego.textContent = 'Agrega preguntas primero';
        return;
      }
      ordenPreguntas = barajar(preguntas.map((_, i) => i));
      pendientes = [];
      indiceActual = 0;
      totalPreguntas = preguntas.length;
      completadas = new Set();
      contador.textContent = `${completadas.size}/${totalPreguntas}`;
      correctas = 0;
      incorrectas = 0;
      reiniciarErrores();
      actualizarStats();
      estadoJuego.textContent = 'En progreso';
      setCreatorCollapsed(true);
      setPreguntaActiva(true);
      mostrarPreguntaActual();
    }

    function mostrarPreguntaActual() {
      if (!ordenPreguntas.length) {
        textoPregunta.textContent = 'Agrega preguntas y presiona "Empezar juego"';
        opcionesJuego.innerHTML = '';
        contador.textContent = `${completadas.size}/${totalPreguntas || preguntas.length || 0}`;
        setPreguntaActiva(false);
        return;
      }
      if (indiceActual >= ordenPreguntas.length) {
        if (pendientes.length) {
          ordenPreguntas = pendientes;
          pendientes = [];
          indiceActual = 0;
        } else {
          estadoJuego.textContent = 'Completado ✅';
          textoPregunta.textContent = '¡Terminaste todas las preguntas!';
          opcionesJuego.innerHTML = '';
          contador.textContent = `${completadas.size}/${totalPreguntas}`;
          actualizarStats();
          setPreguntaActiva(false);
          return;
        }
      }

      const pregunta = preguntas[ordenPreguntas[indiceActual]];
      setPreguntaActiva(true);
      textoPregunta.textContent = pregunta.texto;
      contador.textContent = `${completadas.size}/${totalPreguntas}`;
      opcionesJuego.innerHTML = '';
      const ordenOpciones = barajar(pregunta.opciones.map((_, i) => i));
      ordenOpciones.forEach((optIndex) => {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = pregunta.opciones[optIndex];
        btn.dataset.esCorrecta = optIndex === pregunta.correcta ? 'true' : 'false';
        btn.onclick = () => validarRespuesta(optIndex === pregunta.correcta, btn);
        opcionesJuego.appendChild(btn);
      });
    }

    function validarRespuesta(esCorrecta, btn) {
      const botones = Array.from(opcionesJuego.querySelectorAll('button'));
      botones.forEach((b) => { b.disabled = true; });
      const correctaBtn = botones.find((b) => b.dataset.esCorrecta === 'true');

      if (esCorrecta) {
        btn.classList.add('correct');
        estadoJuego.textContent = '¡Correcto!';
        completadas.add(ordenPreguntas[indiceActual]);
        correctas += 1;
      } else {
        btn.classList.add('incorrect');
        if (correctaBtn) correctaBtn.classList.add('correct');
        if (!pendientes.includes(ordenPreguntas[indiceActual])) {
          pendientes.push(ordenPreguntas[indiceActual]);
        }
        estadoJuego.textContent = 'Respuesta incorrecta';
        incorrectas += 1;
        registrarError(ordenPreguntas[indiceActual]);
      }

      contador.textContent = `${completadas.size}/${totalPreguntas}`;
      actualizarStats();
      setTimeout(() => {
        indiceActual += 1;
        mostrarPreguntaActual();
      }, 900);
    }

    function confirmarBorrado() {
      const materia = obtenerMateriaActual();
      if (!materia) return;
      const seguro = confirm(`¿Seguro que quieres borrar la materia "${materia.nombre || 'sin nombre'}"?`);
      if (!seguro) return;
      materias = materias.filter((m) => m.id !== materiaActualId);
      materiaActualId = materias[0]?.id || '';
      preguntas = obtenerMateriaActual()?.preguntas || [];
      totalPreguntas = preguntas.length;
      completadas = new Set();
      pendientes = [];
      ordenPreguntas = [];
      indiceActual = 0;
      preguntaEditando = null;
      addQuestionBtn.textContent = 'Agregar pregunta';
      renderMateriaSelect();
      renderLista();
      renderMateriaInfo();
      textoPregunta.textContent = materiaActualId ? 'Materia eliminada. Selecciona otra para jugar.' : 'Materia eliminada. Agrega nuevas preguntas para jugar.';
      opcionesJuego.innerHTML = '';
      estadoJuego.textContent = 'Esperando…';
      contador.textContent = '0/0';
      correctas = 0;
      incorrectas = 0;
      actualizarStats();
      reiniciarErrores();
      preguntaInput.value = '';
      construirCamposOpciones();
      guardar();
    }

    function editarPregunta(idx) {
      const pregunta = preguntas[idx];
      if (!pregunta) return;
      preguntaEditando = idx;
      preguntaInput.value = pregunta.texto;
      opcionesCountInput.value = pregunta.opciones.length;
      construirCamposOpciones(pregunta.opciones, pregunta.correcta);
      addQuestionBtn.textContent = 'Guardar cambios';
      mostrarMensaje('Editando pregunta seleccionada');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function eliminarPregunta(idx) {
      if (!confirm('¿Eliminar esta pregunta?')) return;
      preguntas.splice(idx, 1);
      totalPreguntas = preguntas.length;
      completadas = new Set();
      pendientes = [];
      ordenPreguntas = [];
      indiceActual = 0;
      preguntaEditando = null;
      addQuestionBtn.textContent = 'Agregar pregunta';
      estadoJuego.textContent = 'Esperando…';
      textoPregunta.textContent = 'Agrega preguntas y presiona "Empezar juego"';
      opcionesJuego.innerHTML = '';
      contador.textContent = `${completadas.size}/${totalPreguntas || 0}`;
      correctas = 0;
      incorrectas = 0;
      actualizarStats();
      reiniciarErrores();
      setPreguntaActiva(false);
      guardar();
      renderLista();
    }

    function actualizarStats() {
      const totalIntentos = correctas + incorrectas;
      const efectividad = totalIntentos ? Math.round((correctas / totalIntentos) * 100) : 0;
      correctasEl.textContent = `${correctas}`;
      incorrectasEl.textContent = `${incorrectas}`;
      efectividadEl.textContent = `Efectividad: ${efectividad}%`;
      efectividadEl.classList.remove('info', 'eff-high', 'eff-mid', 'eff-low', 'eff-bad');
      if (efectividad >= 90) {
        efectividadEl.classList.add('eff-high');
      } else if (efectividad >= 75) {
        efectividadEl.classList.add('eff-mid');
      } else if (efectividad >= 50) {
        efectividadEl.classList.add('eff-low');
      } else {
        efectividadEl.classList.add('eff-bad');
      }
    }

    function reiniciarErrores() {
      erroresPregunta = {};
      ordenErrorCronologico = 0;
      renderErrores();
    }

    function registrarError(preguntaIdx) {
      const pregunta = preguntas[preguntaIdx];
      if (!pregunta) return;
      const registroActual = erroresPregunta[preguntaIdx] || {
        texto: pregunta.texto,
        conteo: 0,
        opciones: pregunta.opciones,
        correcta: pregunta.correcta,
        ordenCronologico: ordenErrorCronologico++,
      };
      erroresPregunta[preguntaIdx] = { ...registroActual, conteo: registroActual.conteo + 1 };
      renderErrores();
    }

    function cerrarModalDetalle() {
      detalleModal.classList.remove('is-open');
      document.body.style.overflow = '';
    }

    function mostrarDetalleError(info) {
      if (!info) return;
      modalPregunta.textContent = info.texto || 'Pregunta no disponible';
      modalOpciones.innerHTML = '';

      if (Array.isArray(info.opciones) && info.opciones.length) {
        info.opciones.forEach((opcion, idx) => {
          const opcionEl = document.createElement('div');
          opcionEl.className = `modal-option ${idx === info.correcta ? 'correcta' : ''}`;
          opcionEl.textContent = `${idx + 1}. ${opcion}`;
          modalOpciones.appendChild(opcionEl);
        });
      } else {
        const fallback = document.createElement('p');
        fallback.className = 'chip';
        fallback.textContent = 'No hay más detalles de esta pregunta.';
        modalOpciones.appendChild(fallback);
      }

      detalleModal.classList.add('is-open');
      document.body.style.overflow = 'hidden';
    }

    function renderErrores() {
      erroresLista.innerHTML = '';
      const entradas = Object.entries(erroresPregunta);
      if (!entradas.length) {
        erroresLista.innerHTML = '<p class="empty-state">Aún no hay respuestas incorrectas.</p>';
        erroresContador.textContent = '0 errores';
        return;
      }

      const totalErrores = entradas.reduce((acc, [, info]) => acc + info.conteo, 0);
      erroresContador.textContent = `${totalErrores} ${totalErrores === 1 ? 'error' : 'errores'}`;

      entradas
        .sort(([, a], [, b]) => b.ordenCronologico - a.ordenCronologico)
        .forEach(([, info]) => {
          const item = document.createElement('div');
          item.className = 'error-item is-clickable';
          item.setAttribute('role', 'button');
          item.setAttribute('tabindex', '0');
          const texto = document.createElement('p');
          texto.className = 'error-text';
          texto.textContent = info.texto;
          const conteo = document.createElement('div');
          conteo.className = 'error-count';
          conteo.textContent = `${info.conteo}×`;
          item.appendChild(texto);
          item.appendChild(conteo);
          item.addEventListener('click', () => mostrarDetalleError(info));
          item.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              mostrarDetalleError(info);
            }
          });
          erroresLista.appendChild(item);
        });
    }

    opcionesCountInput.addEventListener('change', construirCamposOpciones);
    addQuestionBtn.addEventListener('click', validarPregunta);
    startBtn.addEventListener('click', iniciarJuego);
    clearBtn.addEventListener('click', confirmarBorrado);
    materiaSelect.addEventListener('change', (e) => seleccionarMateria(e.target.value));
    addMateriaBtn.addEventListener('click', toggleNuevaMateria);
    guardarMateriaBtn.addEventListener('click', crearNuevaMateria);
    materiaNombreInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') crearNuevaMateria(); });
    cerrarModalBtn.addEventListener('click', cerrarModalDetalle);
    detalleModal.addEventListener('click', (e) => { if (e.target === detalleModal) cerrarModalDetalle(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') cerrarModalDetalle(); });
    toggleCreatorBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleCreatorPanel();
    });
    creatorCard.addEventListener('click', () => {
      if (creatorCard.classList.contains('is-collapsed')) {
        setCreatorCollapsed(false);
      }
    });

    construirCamposOpciones();
    cargar();
  </script>
